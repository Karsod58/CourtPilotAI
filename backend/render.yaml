services:
  - type: web
    name: courtpilot-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-minimal.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: ENVIRONMENT
        value: production
